<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Preview — RIXSTO</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif;}
  body{background:var(--bg);color:var(--text);}
  .preview-flag{position:fixed;top:0;left:0;right:0;background:#facc15;color:#000;text-align:center;padding:7px;font-size:13px;font-weight:700;z-index:99999;letter-spacing:.03em;}
  .preview-flag span{opacity:.7;font-weight:500;}
  .pv-pushdown{height:34px;}

  .ba-wrap{max-width:780px;margin:0 auto;padding:18px 20px 50px;}
  .ba-back{display:inline-flex;align-items:center;gap:7px;color:var(--soft);font-weight:600;font-size:14px;text-decoration:none;margin-bottom:26px;transition:color .2s;}
  .ba-back:hover{color:var(--accent);}
  .ba-cat{font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
  .ba-title{font-size:38px;line-height:1.12;font-weight:800;color:var(--brand);letter-spacing:-0.01em;margin-bottom:18px;}
  .ba-meta{display:flex;align-items:center;flex-wrap:wrap;gap:14px;color:var(--soft);font-size:14px;font-weight:600;margin-bottom:26px;}
  .ba-stars{color:#f5a623;letter-spacing:2px;font-size:15px;}
  .ba-dot{width:4px;height:4px;border-radius:50%;background:var(--soft);opacity:.5;display:inline-block;}
  .ba-hero{border-radius:16px;overflow:hidden;border:1px solid var(--border);margin-bottom:30px;background:var(--card);}
  .ba-hero img{width:100%;height:380px;object-fit:cover;display:block;}
  .ba-lead{font-size:19px;line-height:1.7;color:var(--text);margin-bottom:28px;}

  /* price / verdict boxes */
  .ba-pricebox{background:var(--card);border:1px solid var(--border);border-left:5px solid var(--accent);border-radius:16px;padding:24px 26px;margin:28px 0;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;box-shadow:0 10px 30px rgba(0,0,0,.06);}
  .ba-pricebox .pb-eyebrow{font-size:12px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
  .ba-pricebox .pb-name{font-size:21px;font-weight:800;color:var(--brand);line-height:1.25;margin-bottom:8px;}
  .ba-pricebox .pb-price{font-size:15px;color:var(--soft);}
  .ba-pricebox .pb-price b{color:var(--accent);font-size:18px;}
  .ba-pricebox .pb-was{text-decoration:line-through;opacity:.6;margin-left:6px;}
  .ba-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-weight:700;font-size:15px;padding:14px 24px;border-radius:12px;text-decoration:none;white-space:nowrap;transition:transform .2s,box-shadow .2s,filter .2s;box-shadow:0 8px 22px rgba(0,0,0,.12);}
  .ba-btn:hover{transform:translateY(-2px);filter:brightness(1.05);box-shadow:0 12px 28px rgba(0,0,0,.18);}

  .ba-body{font-size:17px;line-height:1.8;color:var(--text);margin:30px 0;}
  .ba-body p{margin-bottom:20px;}
  .ba-body h2{font-size:24px;color:var(--brand);font-weight:800;margin:32px 0 14px;}
  .ba-body h3{font-size:19px;color:var(--brand);font-weight:700;margin:24px 0 10px;}
  .ba-body a{color:var(--accent);text-decoration:underline;font-weight:600;}
  .ba-body ul,.ba-body ol{margin:0 0 20px 22px;} .ba-body li{margin-bottom:9px;}
  .ba-body img{max-width:100%;border-radius:12px;margin:18px 0;}

  /* pros / cons */
  .ba-pc{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:30px 0;}
  .ba-pccard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.05);}
  .ba-pccard h4{font-size:17px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .ba-pros h4{color:#22a06b;} .ba-cons h4{color:var(--accent);}
  .ba-pccard ul{list-style:none;padding:0;margin:0;}
  .ba-pccard li{font-size:15px;color:var(--text);opacity:.92;padding-left:26px;position:relative;margin-bottom:12px;line-height:1.5;}
  .ba-pros li::before{content:"✓";position:absolute;left:0;color:#22a06b;font-weight:800;}
  .ba-cons li::before{content:"✕";position:absolute;left:0;color:var(--accent);font-weight:800;}

  /* verdict box */
  .ba-verdict{border:1px solid var(--border);border-radius:18px;padding:30px;margin:34px 0;background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 8%, var(--card)), var(--card));box-shadow:0 8px 26px rgba(0,0,0,.08);border-left:6px solid color-mix(in srgb, var(--accent) 30%, var(--card));}
  .ba-verdict .v-eyebrow{font-size:12px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
  .ba-verdict .v-name{font-size:24px;font-weight:800;color:var(--brand);line-height:1.25;margin-bottom:14px;}
  .ba-verdict .v-text{font-size:16px;color:var(--soft);line-height:1.7;margin-bottom:22px;}

  /* related */
  .ba-related-h{font-size:26px;font-weight:800;color:var(--brand);margin:44px 0 20px;}
  .ba-related{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px;}
  .ba-rcard{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;text-decoration:none;transition:transform .2s,box-shadow .2s;display:block;}
  .ba-rcard:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.12);}
  .ba-rcard img{width:100%;height:150px;object-fit:cover;display:block;}
  .ba-rcard .rc-name{padding:13px 14px;font-weight:700;color:var(--text);font-size:14px;text-align:center;}

  @media(max-width:640px){
    .ba-title{font-size:28px;}
    .ba-hero img{height:230px;}
    .ba-pc{grid-template-columns:1fr;}
    .ba-pricebox{flex-direction:column;align-items:flex-start;}
  }

</style>
</head>
<body>
<div class="preview-flag">👁 PREVIEW MODE <span>— this is how the blog will look when published</span></div>
<div class="pv-pushdown"></div>
<div id="root"></div>

<script>
var THEMES = {"onlinefinds": {"accent": "#EB5030", "brand": "#0A3524", "bg": "#f7f7f7", "card": "#ffffff", "border": "#eaeaea", "text": "#222222", "soft": "#555555"}, "dailyloot": {"accent": "#ff5a5f", "brand": "#ffb84d", "bg": "#09090b", "card": "#161618", "border": "#2a2a2e", "text": "#f4f4f5", "soft": "#cfcfd4"}, "justoneclick": {"accent": "#b45309", "brand": "#3d2c17", "bg": "#f7f2eb", "card": "#fffdf9", "border": "#d8cec3", "text": "#3d352e", "soft": "#7a6a58"}, "phaseblank": {"accent": "#6f8fb3", "brand": "#9fb8d4", "bg": "#0b1220", "card": "#111827", "border": "#263547", "text": "#e5edf7", "soft": "#cdd9e8"}, "cartedupdaily": {"accent": "#f97316", "brand": "#0284c7", "bg": "#f8fafc", "card": "#ffffff", "border": "#e2e8f0", "text": "#1e293b", "soft": "#475569"}};
var CHROME = {"onlinefinds": {"handle": "RIXSTO", "ig": "https://rixsto.in", "logo": "/logo.png", "banner": "#0A3524", "navbg": "#ffffff", "navtext": "#0A3524", "footbg": "#ffffff", "foottext": "#777"}, "dailyloot": {"handle": "@dailyloot.co", "ig": "https://www.instagram.com/dailyloot.co", "logo": "/dailyloot.jpg", "banner": "linear-gradient(90deg,#0284c7,#f97316)", "navbg": "#111111", "navtext": "#ffb84d", "footbg": "#111111", "foottext": "#b8c4d4"}, "justoneclick": {"handle": "@just.one_click.co", "ig": "https://www.instagram.com/just.one_click.co", "logo": "/justoneclick.jpg", "banner": "linear-gradient(90deg,#d8cec3,#c8b8a6)", "navbg": "#fffdf9", "navtext": "#3d2c17", "footbg": "#fffdf9", "foottext": "#777"}, "phaseblank": {"handle": "@phase.blank", "ig": "https://www.instagram.com/phase.blank", "logo": "/phaseblank.jpg", "banner": "linear-gradient(90deg,#111827,#334155)", "navbg": "#111827", "navtext": "#9fb8d4", "footbg": "#111827", "foottext": "#b8c4d4"}, "cartedupdaily": {"handle": "@cartedupdaily", "ig": "https://www.instagram.com/cartedupdaily", "logo": "/cartedupdaily.jpg", "banner": "linear-gradient(90deg,#0284c7,#f97316)", "navbg": "#ffffff", "navtext": "#0284c7", "footbg": "#ffffff", "foottext": "#777"}};

function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function mdToHtml(md){
  if(!md) return "";
  md = esc(md);
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  md = md.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  return md.split(/\n\n+/).map(function(b){
    b=b.trim(); if(!b) return "";
    if(b.indexOf("## ")===0) return "<h2>"+b.slice(3)+"</h2>";
    if(b.indexOf("### ")===0) return "<h3>"+b.slice(4)+"</h3>";
    return "<p>"+b.replace(/\n/g,"<br>")+"</p>";
  }).join("");
}
function starHtml(r){ r=parseFloat(r)||0; var f=Math.floor(r),h=(r-f)>=0.5?1:0,e=5-f-h; return "\u2605".repeat(f)+(h?"\u2be8":"")+"\u2606".repeat(e<0?0:e); }
function readMins(t){ var w=(t||"").trim().split(/\s+/).filter(Boolean).length; return Math.max(1,Math.round(w/200)); }

function topChrome(site){
  var c=CHROME[site]||CHROME.phaseblank;
  var s='<div style="background:'+c.banner+';color:#fff;text-align:center;padding:10px;font-size:14px;">\ud83d\ude80 100+ Curated Picks \u2192 <a href="'+c.ig+'" style="color:#22c55e;text-decoration:none;font-weight:600;">Explore RIXSTO</a></div>';
  s+='<div style="background:'+c.navbg+';border-bottom:1px solid var(--border);"><div style="max-width:1200px;margin:auto;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;">';
  s+='<div style="display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;color:'+c.navtext+';"><img src="'+c.logo+'" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" onerror="this.style.display=\'none\'"><span>'+esc(c.handle)+'</span></div>';
  s+='<a href="'+c.ig+'" style="color:'+c.navtext+';text-decoration:none;font-weight:600;font-size:14px;">Instagram</a></div></div>';
  return s;
}
function bottomChrome(site){
  var c=CHROME[site]||CHROME.phaseblank;
  var s='<div style="max-width:800px;margin:30px auto;background:var(--card);border:1px solid var(--border);padding:25px;text-align:center;border-radius:12px;"><h3 style="color:var(--brand);margin:0 0 8px;">\ud83d\udc40 Finding these useful?</h3><p style="color:var(--soft);margin:0 0 14px;">We\'ve got better deals &amp; exclusive picks on our main store.</p><a href="https://rixsto.in" style="display:inline-block;background:var(--accent);color:#fff;padding:11px 20px;border-radius:8px;text-decoration:none;font-weight:600;">Explore RIXSTO \u2192</a></div>';
  s+='<div style="background:'+c.footbg+';padding:15px 20px;text-align:center;font-size:13px;color:'+c.foottext+';border-top:1px solid var(--border);">\u2705 Best Deals &nbsp;&nbsp; \ud83d\ude9a Fast Delivery &nbsp;&nbsp; \ud83d\udd12 Secure Shopping</div>';
  s+='<div style="background:'+c.footbg+';border-top:1px solid var(--border);"><div style="text-align:center;font-size:12px;color:'+c.foottext+';padding:15px;">\u00a9 2026 RIXSTO</div>';
  s+='<div style="font-size:11px;color:#888;text-align:center;padding:12px;">This page contains affiliate links. We may earn a commission if you make a purchase through our links at no extra cost to you.</div></div>';
  return s;
}
function articleHtml(p){
  var name=esc(p.name||"Untitled product");
  var img=p.blog_image||p.image||"";
  var pros=(p.pros||[]).filter(Boolean), cons=(p.cons||[]).filter(Boolean);
  var rt=readMins((p.lead||"")+" "+(p.body||"")+" "+(p.verdict||""));
  var rating=parseFloat(p.rating)||0;
  var h='<div class="ba-wrap">';
  h+='<a class="ba-back" href="#">\u2190 Back</a>';
  if(p.category) h+='<div class="ba-cat">'+esc(p.category)+'</div>';
  h+='<h1 class="ba-title">'+name+' \u2014 Honest Review</h1>';
  h+='<div class="ba-meta">';
  if(rating>0) h+='<span class="ba-stars">'+starHtml(rating)+'</span><span>'+rating+' / 5</span><span class="ba-dot"></span>';
  h+='<span>Updated daily</span><span class="ba-dot"></span><span>'+rt+' min read</span></div>';
  if(img) h+='<div class="ba-hero"><img src="'+esc(img)+'" alt="'+name+'"></div>';
  if(p.lead) h+='<p class="ba-lead">'+esc(p.lead)+'</p>';
  h+='<div class="ba-pricebox"><div>';
  h+='<div class="pb-eyebrow">\u26a1 Quick verdict \u2014 best price</div>';
  h+='<div class="pb-name">'+name+'</div>';
  if(p.price){ h+='<div class="pb-price">'+(p.was?'<span class="pb-was">'+esc(p.was)+'</span> ':'')+'Today\'s price: <b>'+esc(p.price)+'</b></div>'; }
  h+='</div><a class="ba-btn" href="'+esc(p.link||"#")+'" target="_blank" rel="noopener sponsored nofollow">Check price \u2192</a></div>';
  if(p.body) h+='<div class="ba-body">'+mdToHtml(p.body)+'</div>';
  if(pros.length||cons.length){
    h+='<div class="ba-pc">';
    if(pros.length){ h+='<div class="ba-pccard ba-pros"><h4>\ud83d\udc4d What we loved</h4><ul>'; pros.forEach(function(x){h+='<li>'+esc(x)+'</li>';}); h+='</ul></div>'; }
    if(cons.length){ h+='<div class="ba-pccard ba-cons"><h4>\ud83d\udc4e Worth knowing</h4><ul>'; cons.forEach(function(x){h+='<li>'+esc(x)+'</li>';}); h+='</ul></div>'; }
    h+='</div>';
  }
  if(p.verdict){
    h+='<div class="ba-verdict"><div class="v-eyebrow">\u2605 Our verdict</div>';
    h+='<div class="v-name">'+name+'</div><div class="v-text">'+esc(p.verdict)+'</div>';
    h+='<a class="ba-btn" href="'+esc(p.link||"#")+'" target="_blank" rel="noopener sponsored nofollow">Get it at the best price \u2192</a></div>';
  }
  h+='</div>';
  return h;
}

function render(){
  var params = new URLSearchParams(location.search);
  var site = params.get("site") || "phaseblank";
  var th = THEMES[site] || THEMES.phaseblank;
  document.documentElement.style.cssText =
    "--accent:"+th.accent+";--brand:"+th.brand+";--bg:"+th.bg+";--card:"+th.card+";--border:"+th.border+";--text:"+th.text+";--soft:"+th.soft+";";
  document.body.style.background = th.bg;

  var p = null;
  // 1) data passed directly in the URL (works for unsaved products)
  var d = params.get("d");
  if(d){ try { p = JSON.parse(decodeURIComponent(escape(atob(d)))); } catch(e){ try{ p=JSON.parse(atob(d)); }catch(e2){} } }
  // 2) fallback: slug + site -> read the published products json
  if(!p){
    var slug = params.get("slug");
    if(slug){
      var fileMap={onlinefinds:"index",dailyloot:"dailyloot",justoneclick:"justoneclick",phaseblank:"phaseblank",cartedupdaily:"cartedupdaily"};
      fetch("/products/"+(fileMap[site]||"index")+".json").then(function(r){return r.json();}).then(function(j){
        var found=(j.products||[]).filter(function(x){return (x.slug||"")===slug || (x.name||"").toLowerCase().replace(/[^a-z0-9]+/g,"-")===slug;})[0];
        paint(found, site);
      }).catch(function(){ paint(null, site); });
      return;
    }
  }
  paint(p, site);
}
function paint(p, site){
  if(!p){ document.getElementById("root").innerHTML='<div style="padding:60px;text-align:center;color:#888;font-size:16px;">No product data. Open this from the CMS \u201cPreview\u201d button.</div>'; return; }
  document.getElementById("root").innerHTML = topChrome(site) + articleHtml(p) + bottomChrome(site);
  document.title = (p.name||"Preview") + " \u2014 Preview";
}
render();
</script>
</body>
</html>
