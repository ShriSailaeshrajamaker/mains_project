<style>
  #rcrop-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999999;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  #rcrop-overlay.active{display:flex;}
  #rcrop-box{background:#1a1a1a;border-radius:14px;padding:20px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
  #rcrop-header{display:flex;align-items:center;justify-content:space-between;color:#fff;font-family:system-ui,sans-serif;}
  #rcrop-header h3{margin:0;font-size:16px;font-weight:700;}
  #rcrop-header span{font-size:12px;color:#aaa;}
  #rcrop-img-wrap{width:min(720px,86vw);height:min(420px,55vh);background:#111;border-radius:8px;overflow:hidden;position:relative;}
  #rcrop-img-wrap img{display:block;max-width:100%;}
  #rcrop-ratio-bar{display:flex;gap:8px;flex-wrap:wrap;}
  .rcrop-rb{padding:6px 14px;border-radius:20px;border:1.5px solid #444;background:transparent;color:#ccc;font-size:13px;cursor:pointer;font-family:system-ui,sans-serif;transition:all .15s;}
  .rcrop-rb:hover{border-color:#888;color:#fff;}
  .rcrop-rb.active{border-color:#EB5030;background:#EB5030;color:#fff;font-weight:700;}
  #rcrop-actions{display:flex;gap:10px;justify-content:flex-end;}
  #rcrop-cancel{padding:10px 22px;border-radius:8px;border:1.5px solid #555;background:transparent;color:#ccc;font-size:14px;cursor:pointer;font-family:system-ui,sans-serif;}
  #rcrop-confirm{padding:10px 22px;border-radius:8px;border:none;background:#EB5030;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:system-ui,sans-serif;}
  #rcrop-confirm:hover{filter:brightness(1.1);}
</style>

<body>
<script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
<script>
// Register image-crop widget early, before CMS initializes
window.addEventListener('DOMContentLoaded', function() {
  var _interval = setInterval(function() {
    if (!window.CMS || !window.createClass) return;
    clearInterval(_interval);

    var ImageCropControl = createClass({
      getInitialState: function() { return { pv: this.props.value || '', ld: false }; },
      componentDidUpdate: function(p) {
        if (p.value !== this.props.value && !this.state.ld)
          this.setState({ pv: this.props.value || '' });
      },
      onFile: function(e) {
        var self = this, f = e.target.files && e.target.files[0]; if (!f) return;
        var r = new FileReader();
        r.onload = function(ev) {
          self.setState({ ld: true });
          window.rixstoCrop(ev.target.result)
            .then(function(d) { self.setState({ pv: d, ld: false }); self.props.onChange(d); })
            .catch(function() { self.setState({ ld: false }); });
        };
        r.readAsDataURL(f); e.target.value = '';
      },
      onUrl: function(e) { var v = e.target.value; this.setState({ pv: v }); this.props.onChange(v); },
      onRecrop: function() {
        var self = this, s = this.state.pv; if (!s) return;
        window.rixstoCrop(s).then(function(d) { self.setState({ pv: d }); self.props.onChange(d); });
      },
      render: function() {
        var self = this, pv = this.state.pv, ld = this.state.ld;
        return h('div', { style: { fontFamily: 'system-ui,sans-serif' } },
          h('div', { style: { display: 'flex', gap: '8px', marginBottom: '10px', flexWrap: 'wrap' } },
            h('input', {
              type: 'text', placeholder: 'Paste image URL or upload below',
              value: (pv && !pv.startsWith('data:')) ? pv : '',
              onChange: self.onUrl,
              style: { flex: '1', minWidth: '180px', padding: '8px 10px', borderRadius: '6px', border: '1px solid #ccc', fontSize: '13px' }
            }),
            h('label', {
              style: { display: 'inline-flex', alignItems: 'center', gap: '5px', padding: '8px 14px',
                background: '#0A3524', color: '#fff', borderRadius: '6px',
                cursor: ld ? 'not-allowed' : 'pointer', fontSize: '13px', fontWeight: '600',
                whiteSpace: 'nowrap', opacity: ld ? 0.7 : 1 }
            },
              ld ? 'Loading...' : 'Upload & Crop',
              h('input', { type: 'file', accept: 'image/*', onChange: self.onFile, disabled: ld, style: { display: 'none' } })
            )
          ),
          pv ? h('div', { style: { position: 'relative', display: 'inline-block' } },
            h('img', { src: pv, style: { maxWidth: '100%', maxHeight: '180px', borderRadius: '8px', border: '1px solid #ddd', display: 'block' } }),
            h('button', {
              onClick: self.onRecrop,
              style: { position: 'absolute', top: '6px', right: '6px', background: 'rgba(0,0,0,.65)',
                color: '#fff', border: 'none', borderRadius: '6px', padding: '5px 10px',
                fontSize: '12px', cursor: 'pointer', fontWeight: '700' }
            }, 'Re-crop')
          ) : null
        );
      }
    });

    var ImageCropPreview = createClass({
      render: function() {
        var v = this.props.value;
        return v
          ? h('img', { src: v, style: { maxWidth: '100%', maxHeight: '200px', borderRadius: '8px' } })
          : h('div', { style: { color: '#999', fontSize: '13px' } }, 'No image');
      }
    });

    try {
      CMS.registerWidget('image-crop', ImageCropControl, ImageCropPreview);
      console.log('[Rixsto] image-crop widget registered');
    } catch(e) {
      console.warn('[Rixsto] image-crop registration failed:', e);
    }
  }, 50);
});
</script>

<script>
/* ============================================================
   LIVE BLOG PREVIEW
   As the user fills a product, the right-hand pane shows the
   actual themed blog layout for each product in the list.
   ============================================================ */

// per-site colours (mirror of _data/themes.js)
var THEMES = {
  onlinefinds:   { accent:"#EB5030", brand:"#0A3524", bg:"#f7f7f7", card:"#ffffff", border:"#eaeaea", text:"#222222", soft:"#555555" },
  dailyloot:     { accent:"#ff5a5f", brand:"#ffb84d", bg:"#09090b", card:"#161618", border:"#2a2a2e", text:"#f4f4f5", soft:"#cfcfd4" },
  justoneclick:  { accent:"#8b7355", brand:"#6b5b4d", bg:"#f7f2eb", card:"#fffdf9", border:"#d8cec3", text:"#3d352e", soft:"#6b5b4d" },
  phaseblank:    { accent:"#6f8fb3", brand:"#9fb8d4", bg:"#0b1220", card:"#111827", border:"#263547", text:"#e5edf7", soft:"#cdd9e8" },
  cartedupdaily: { accent:"#f97316", brand:"#0284c7", bg:"#f8fafc", card:"#ffffff", border:"#e2e8f0", text:"#1e293b", soft:"#475569" }
};

function siteFromCollection(name){
  if (THEMES[name]) return name;
  return "phaseblank";
}

function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function mdToHtml(md){
  if(!md) return "";
  md = esc(md);
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  md = md.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  var blocks = md.split(/\n\n+/).map(function(b){
    b = b.trim();
    if(!b) return "";
    if(b.indexOf("## ")===0) return "<h2>"+b.slice(3)+"</h2>";
    if(b.indexOf("### ")===0) return "<h3>"+b.slice(4)+"</h3>";
    return "<p>"+b.replace(/\n/g,"<br>")+"</p>";
  });
  return blocks.join("");
}

function stars(r){
  r = parseFloat(r)||0;
  var full=Math.floor(r), half=(r-full)>=0.5?1:0, empty=5-full-half;
  return "★".repeat(full)+(half?"⯨":"")+"☆".repeat(empty<0?0:empty);
}

function readMins(txt){
  var w=(txt||"").trim().split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(w/200));
}

function renderProductBlog(p, th){
  if(!p) return "";
  var name = esc(p.name||"Untitled product");
  var img = p.blog_image || p.image || "";
  var pros = (p.pros||[]).filter(Boolean);
  var cons = (p.cons||[]).filter(Boolean);
  var rt = readMins((p.lead||"")+" "+(p.body||"")+" "+(p.verdict||""));

  var h = "";
  h += '<div style="max-width:680px;margin:0 auto;padding:20px;font-family:system-ui,sans-serif;color:'+th.text+';">';
  h += '<a style="color:'+th.soft+';font-weight:600;font-size:14px;text-decoration:none;">‹ Back to all finds</a>';
  if(p.category) h += '<div style="font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:'+th.accent+';margin:16px 0 10px;">'+esc(p.category)+'</div>';
  h += '<h1 style="font-size:30px;line-height:1.15;font-weight:800;color:'+th.brand+';margin:0 0 14px;">'+name+' — Honest Review</h1>';
  h += '<div style="display:flex;gap:12px;align-items:center;color:'+th.soft+';font-size:14px;font-weight:600;margin-bottom:20px;">';
  if(parseFloat(p.rating)>0) h += '<span style="color:#f5a623;letter-spacing:2px;">'+stars(p.rating)+'</span><span>'+p.rating+' / 5</span><span>•</span>';
  h += '<span>Updated daily</span><span>•</span><span>'+rt+' min read</span></div>';
  if(img) h += '<div style="border-radius:14px;overflow:hidden;border:1px solid '+th.border+';margin-bottom:22px;"><img src="'+esc(img)+'" style="width:100%;height:300px;object-fit:cover;display:block;"></div>';
  if(p.lead) h += '<p style="font-size:18px;line-height:1.7;margin-bottom:22px;">'+esc(p.lead)+'</p>';

  h += '<div style="background:'+th.card+';border:1px solid '+th.border+';border-left:5px solid '+th.accent+';border-radius:14px;padding:20px;margin:22px 0;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;">';
  h += '<div><div style="font-size:12px;font-weight:800;text-transform:uppercase;color:'+th.accent+';margin-bottom:6px;">⚡ Quick verdict — best price</div>';
  h += '<div style="font-size:20px;font-weight:800;color:'+th.brand+';">'+name+'</div>';
  if(p.price){ h += '<div style="font-size:15px;color:'+th.soft+';margin-top:6px;">Today\'s price: <b style="color:'+th.accent+';">'+esc(p.price)+'</b>'; if(p.was) h += ' <span style="text-decoration:line-through;opacity:.6;">'+esc(p.was)+'</span>'; h += '</div>'; }
  h += '</div><a style="background:'+th.accent+';color:#fff;font-weight:700;padding:13px 22px;border-radius:11px;text-decoration:none;white-space:nowrap;">Check price →</a></div>';

  if(p.body) h += '<div style="font-size:16px;line-height:1.8;margin:24px 0;">'+mdToHtml(p.body)+'</div>';

  if(pros.length || cons.length){
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0;">';
    if(pros.length){ h += '<div style="background:'+th.card+';border:1px solid '+th.border+';border-radius:14px;padding:18px;"><h4 style="color:#22a06b;margin:0 0 12px;">👍 What we loved</h4><ul style="list-style:none;padding:0;margin:0;">'; pros.forEach(function(x){ h += '<li style="padding-left:22px;position:relative;margin-bottom:9px;font-size:14px;">✓ '+esc(x)+'</li>'; }); h += '</ul></div>'; }
    if(cons.length){ h += '<div style="background:'+th.card+';border:1px solid '+th.border+';border-radius:14px;padding:18px;"><h4 style="color:'+th.accent+';margin:0 0 12px;">👎 Worth knowing</h4><ul style="list-style:none;padding:0;margin:0;">'; cons.forEach(function(x){ h += '<li style="padding-left:22px;position:relative;margin-bottom:9px;font-size:14px;">✕ '+esc(x)+'</li>'; }); h += '</ul></div>'; }
    h += '</div>';
  }

  if(p.verdict){
    h += '<div style="border:1px solid '+th.border+';border-radius:16px;padding:26px;margin:28px 0;background:'+th.card+';">';
    h += '<div style="font-size:12px;font-weight:800;text-transform:uppercase;color:'+th.accent+';margin-bottom:12px;">★ Our verdict</div>';
    h += '<div style="font-size:22px;font-weight:800;color:'+th.brand+';margin-bottom:12px;">'+name+'</div>';
    h += '<div style="font-size:16px;color:'+th.soft+';line-height:1.7;margin-bottom:20px;">'+esc(p.verdict)+'</div>';
    h += '<a style="background:'+th.accent+';color:#fff;font-weight:700;padding:13px 22px;border-radius:11px;text-decoration:none;">Get it at the best price →</a></div>';
  }
  h += '</div>';
  return h;
}

// Site base URLs for live preview
var SITE_BASE_URLS = {
  onlinefinds:   "https://onlinefinds.rixsto.in",
  dailyloot:     "https://dailyloot.co",
  justoneclick:  "https://just.one-click.co",
  phaseblank:    "https://phase.blank",
  cartedupdaily: "https://cartedupdaily.com"
};

var SITE_FILE = { onlinefinds:"index", dailyloot:"dailyloot", justoneclick:"justoneclick", phaseblank:"phaseblank", cartedupdaily:"cartedupdaily" };

function buildPreviewUrl(site, p){
  // encode the product as base64 JSON so the standalone page can render it (even unsaved)
  var json = JSON.stringify(p || {});
  var b64;
  try { b64 = btoa(unescape(encodeURIComponent(json))); } catch(e){ b64 = btoa(json); }
  return "/preview.html?site=" + encodeURIComponent(site) + "&d=" + encodeURIComponent(b64);
}

// Wait for Decap CMS to be ready (same pattern as the crop widget),
// because createClass / CMS only exist once the CMS bundle has initialised.
(function registerBlogPreview(){
  var _pv = setInterval(function(){
    if (!window.CMS || !window.createClass) return;   // keep waiting
    clearInterval(_pv);

    var BlogPreview = createClass({
      render: function(){
        var collection = this.props.collection;
        var site = siteFromCollection(collection.get("name"));
        var th = THEMES[site] || THEMES.phaseblank;
        var data = this.props.entry.get("data");
        var list = data.get("products");
        var products = list ? list.toJS() : [];

        if(!products.length){
          return h("div", { style:{ padding:"50px 30px", fontFamily:"system-ui", color:"#888", textAlign:"center" } },
            h("div", { style:{ fontSize:"38px", marginBottom:"10px" } }, "\ud83d\udc41\ufe0f"),
            h("div", { style:{ fontSize:"15px" } }, "Add a product on the left, then click \u201cOpen full preview\u201d to see its blog page.")
          );
        }

        var rows = products.map(function(p, i){
          var name = (p && p.name) ? p.name : "(unnamed product)";
          return h("div", {
            key: i,
            style:{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:"12px",
                    padding:"14px 16px", border:"1px solid #e2e2e2", borderRadius:"10px",
                    marginBottom:"10px", background:"#fff" }
          },
            h("div", { style:{ fontWeight:700, color:"#222", fontSize:"15px" } }, name),
            h("button", {
              onClick: function(){ window.open(buildPreviewUrl(site, p), "_blank"); },
              style:{ background: th.accent, color:"#fff", border:"none", padding:"10px 18px",
                      borderRadius:"8px", fontWeight:700, fontSize:"14px", cursor:"pointer", whiteSpace:"nowrap" }
            }, "\ud83d\udd0d Open full preview")
          );
        });

        return h("div", { style:{ padding:"20px", fontFamily:"system-ui,sans-serif", background:"#f4f4f5", minHeight:"100%" } },
          h("div", { style:{ fontSize:"13px", color:"#666", marginBottom:"14px", lineHeight:1.5 } },
            "Click \u201cOpen full preview\u201d on any product to see its blog page exactly as it will publish \u2014 opens in a new tab."),
          h("div", null, rows)
        );
      }
    });

    try {
      ["onlinefinds","dailyloot","justoneclick","phaseblank","cartedupdaily"].forEach(function(name){
        CMS.registerPreviewTemplate(name, BlogPreview);
      });
      console.log("[Rixsto] blog preview (Open full preview buttons) registered");
    } catch (e) {
      console.error("[Rixsto] Preview registration failed:", e);
    }
  }, 50);
})();
</script>

<!-- RIXSTO CROP MODAL -->
<div id="rcrop-overlay">
  <div id="rcrop-box">
    <div id="rcrop-header"><h3>&#x2702;&#xFE0F; Crop Image</h3><span>Drag &middot; Handles to resize</span></div>
    <div id="rcrop-img-wrap"><img id="rcrop-img" src=""></div>
    <div id="rcrop-ratio-bar">
      <button class="rcrop-rb active" data-ratio="1">1:1 Square</button>
      <button class="rcrop-rb" data-ratio="1.3333">4:3</button>
      <button class="rcrop-rb" data-ratio="1.7778">16:9</button>
      <button class="rcrop-rb" data-ratio="0.75">3:4 Portrait</button>
      <button class="rcrop-rb" data-ratio="free">Free</button>
    </div>
    <div id="rcrop-actions">
      <button id="rcrop-cancel">Cancel</button>
      <button id="rcrop-confirm">&#x2713; Use Cropped Image</button>
    </div>
  </div>
</div>
<script>
(function(){
  var ci=null,pr=null,pj=null;
  var ov=document.getElementById("rcrop-overlay");
  var img=document.getElementById("rcrop-img");
  var ok=document.getElementById("rcrop-confirm");
  var cx=document.getElementById("rcrop-cancel");
  var rb=document.getElementById("rcrop-ratio-bar");
  function dc(){ if(ci){ci.destroy();ci=null;} }
  window.rixstoCrop=function(dataUrl){
    return new Promise(function(res,rej){
      pr=res; pj=rej; img.src=""; ov.classList.add("active");
      img.onload=function(){
        dc(); ci=new Cropper(img,{aspectRatio:1,viewMode:1,autoCropArea:0.85,movable:true,zoomable:true,scalable:false,rotatable:false});
        document.querySelectorAll(".rcrop-rb").forEach(function(b,i){b.classList.toggle("active",i===0);});
      }; img.src=dataUrl;
    });
  };
  rb.addEventListener("click",function(e){
    var b=e.target.closest(".rcrop-rb"); if(!b||!ci) return;
    document.querySelectorAll(".rcrop-rb").forEach(function(x){x.classList.remove("active");}); b.classList.add("active");
    ci.setAspectRatio(b.dataset.ratio==="free"?NaN:parseFloat(b.dataset.ratio));
  });
  ok.addEventListener("click",function(){
    if(!ci||!pr) return;
    ci.getCroppedCanvas({maxWidth:1400,maxHeight:1400,imageSmoothingQuality:"high"}).toBlob(function(blob){
      var r=new FileReader(); r.onload=function(){ dc(); ov.classList.remove("active"); var fn=pr; pr=null; fn(r.result); }; r.readAsDataURL(blob);
    },"image/jpeg",0.92);
  });
  cx.addEventListener("click",function(){ dc(); ov.classList.remove("active"); if(pj){var f=pj;pj=null;f(new Error("cancelled"));} });
  ov.addEventListener("click",function(e){if(e.target===ov)cx.click();});

})();
</script>

<script>
/* ============================================================
   EDITOR-PANE PREVIEW BUTTON  (reliable, no preview-pane dependency)
   Injects a floating "Open full preview" button while editing a
   collection. Reads the live entry from CMS.store and opens
   preview.html in a new tab with the current product data.
   ============================================================ */
(function(){
  var SITE_KEYS = ["onlinefinds","dailyloot","justoneclick","phaseblank","cartedupdaily"];

  function currentSite(state){
    try {
      var col = state.entryDraft.getIn(["entry","collection"]);
      if (col && SITE_KEYS.indexOf(col) !== -1) return col;
    } catch(e){}
    // fallback: read from the URL hash, e.g. #/collections/onlinefinds/...
    var m = (location.hash||"").match(/collections\/([^\/]+)/);
    if (m && SITE_KEYS.indexOf(m[1]) !== -1) return m[1];
    return "onlinefinds";
  }

  function getProducts(state){
    try {
      var data = state.entryDraft.getIn(["entry","data"]);
      if (!data) return [];
      var list = data.get ? data.get("products") : null;
      if (!list) return [];
      return list.toJS ? list.toJS() : list;
    } catch(e){ return []; }
  }

  function b64(p){
    var json = JSON.stringify(p||{});
    try { return btoa(unescape(encodeURIComponent(json))); } catch(e){ return btoa(json); }
  }

  function openPreview(site, products){
    if (!products.length){ alert("Add at least one product first."); return; }
    if (products.length === 1){
      window.open("/preview.html?site="+encodeURIComponent(site)+"&d="+encodeURIComponent(b64(products[0])), "_blank");
      return;
    }
    // multiple: show a tiny chooser
    showChooser(site, products);
  }

  function showChooser(site, products){
    var old = document.getElementById("rx-chooser"); if(old) old.remove();
    var ov = document.createElement("div");
    ov.id = "rx-chooser";
    ov.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999998;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;";
    var box = document.createElement("div");
    box.style.cssText = "background:#fff;border-radius:14px;padding:22px;max-width:440px;width:90%;max-height:80vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);";
    box.innerHTML = '<div style="font-weight:800;font-size:17px;margin-bottom:14px;color:#222;">Which product to preview?</div>';
    products.forEach(function(p,i){
      var b = document.createElement("button");
      b.textContent = (p.name||("Product "+(i+1)));
      b.style.cssText = "display:block;width:100%;text-align:left;padding:12px 14px;margin-bottom:8px;border:1px solid #ddd;border-radius:9px;background:#f8f8f8;font-size:15px;font-weight:600;color:#222;cursor:pointer;";
      b.onclick = function(){ window.open("/preview.html?site="+encodeURIComponent(site)+"&d="+encodeURIComponent(b64(p)), "_blank"); ov.remove(); };
      box.appendChild(b);
    });
    var cancel = document.createElement("button");
    cancel.textContent = "Cancel";
    cancel.style.cssText = "margin-top:6px;padding:9px 16px;border:none;background:#eee;border-radius:8px;cursor:pointer;font-size:14px;";
    cancel.onclick = function(){ ov.remove(); };
    box.appendChild(cancel);
    ov.appendChild(box);
    ov.addEventListener("click", function(e){ if(e.target===ov) ov.remove(); });
    document.body.appendChild(ov);
  }

  function ensureButton(){
    // only show while editing an entry (URL contains /entries/ or /collections/.../new)
    var editing = /collections\/[^\/]+\/(entries|new)/.test(location.hash||"");
    var btn = document.getElementById("rx-preview-fab");
    if (!editing){ if(btn) btn.style.display="none"; return; }

    if (!btn){
      btn = document.createElement("button");
      btn.id = "rx-preview-fab";
      btn.textContent = "🔍 Open full preview";
      btn.style.cssText = "position:fixed;bottom:22px;right:22px;z-index:999990;background:#0A3524;color:#fff;border:none;padding:14px 22px;border-radius:30px;font-size:15px;font-weight:700;font-family:system-ui,sans-serif;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.3);";
      btn.onmouseenter=function(){ btn.style.filter="brightness(1.15)"; };
      btn.onmouseleave=function(){ btn.style.filter="none"; };
      btn.onclick = function(){
        if (!window.CMS || !CMS.store){ alert("CMS still loading, try again in a second."); return; }
        var state = CMS.store.getState();
        var site = currentSite(state);
        var products = getProducts(state);
        openPreview(site, products);
      };
      document.body.appendChild(btn);
    }
    btn.style.display = "block";
  }

  // poll for editing state (hash changes + periodic)
  window.addEventListener("hashchange", ensureButton);
  setInterval(ensureButton, 800);
  setTimeout(ensureButton, 1200);
})();
</script>
</body>
</html>
