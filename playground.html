<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rixsto — Dev Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }

        body {
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 32px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: #58a6ff;
            letter-spacing: -0.01em;
        }
        .header p {
            font-size: 13px;
            color: #8b949e;
            margin-top: 6px;
        }

        .search-wrap {
            max-width: 480px;
            margin: 0 auto 32px;
        }
        .search-wrap input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
        }
        .search-wrap input:focus { border-color: #58a6ff; }
        .search-wrap input::placeholder { color: #484f58; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .env-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
        }

        .env-card-header {
            padding: 14px 18px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .05em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #30363d;
        }

        .env-dev  .env-card-header { background: #1c2128; color: #79c0ff; }
        .env-qa   .env-card-header { background: #1c2128; color: #d2a8ff; }
        .env-prod .env-card-header { background: #1c2128; color: #56d364; }

        .env-links { padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }

        .env-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 10px;
            border-radius: 7px;
            text-decoration: none;
            color: #c9d1d9;
            font-size: 13px;
            border: 1px solid transparent;
            transition: all 0.15s;
        }
        .env-link:hover {
            background: #21262d;
            border-color: #388bfd40;
            color: #fff;
        }
        .env-link .label { font-weight: 600; display: flex; align-items: center; gap: 7px; }
        .env-link .label .icon { font-size: 15px; }
        .env-link .url { font-size: 11px; color: #484f58; font-family: monospace; }
        .env-link:hover .url { color: #8b949e; }

        .badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: .04em;
        }
        .badge-dev  { background: #1f3a5f; color: #79c0ff; }
        .badge-qa   { background: #2d1f5f; color: #d2a8ff; }
        .badge-prod { background: #1a3a23; color: #56d364; }

        .no-results {
            text-align: center;
            color: #484f58;
            font-size: 14px;
            padding: 40px;
            grid-column: 1/-1;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🛠️ Rixsto Dev Panel</h1>
    <p>All environments and storefronts in one place</p>
</div>

<div class="search-wrap">
    <input type="text" id="search" placeholder="Filter by name or URL…">
</div>

<div class="grid" id="grid"></div>

<script>
const ENVS = [
    {
        id: 'prod',
        label: '🚀 Prod',
        badgeClass: 'badge-prod',
        base: 'https://onlinefinds.rixsto.in',
        adminPath: '/admin/',
    },
    {
        id: 'dev',
        label: '🛠️ Dev',
        badgeClass: 'badge-dev',
        base: 'https://develop.onlinefinds.rixsto.in',
        adminPath: '/admin-dev/',
    },
    {
        id: 'qa',
        label: '🧪 QA',
        badgeClass: 'badge-qa',
        base: 'https://qa.onlinefinds.rixsto.in',
        adminPath: '/admin-qa/',
    },

];

const SITES = [
    { label: 'Online Finds',    icon: '🏠', path: '/' },
    { label: 'CMS Admin',       icon: '⚙️', path: '__admin__' },
    { label: 'DailyLoot',       icon: '🎯', path: '/@dailyloot.co' },
    { label: 'Just One Click',  icon: '👆', path: '/@just.one_click.co' },
    { label: 'Phase Blank',     icon: '🌙', path: '/@phase.blank' },
    { label: 'Carted Up Daily', icon: '🛒', path: '/@cartedupdaily' },
];

function buildUrl(env, site) {
    return site.path === '__admin__' ? env.base + env.adminPath : env.base + site.path;
}

function shortUrl(env, site) {
    const full = buildUrl(env, site);
    return full.replace('https://', '');
}

function render(filter) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    let anyVisible = false;

    ENVS.forEach(env => {
        const links = SITES.filter(site => {
            if (!filter) return true;
            const q = filter.toLowerCase();
            return site.label.toLowerCase().includes(q) ||
                   shortUrl(env, site).toLowerCase().includes(q) ||
                   env.label.toLowerCase().includes(q);
        });

        if (!links.length) return;
        anyVisible = true;

        const card = document.createElement('div');
        card.className = 'env-card env-' + env.id;

        card.innerHTML = `
            <div class="env-card-header">
                ${env.label} Environment
                <span class="badge ${env.badgeClass}">${env.id.toUpperCase()}</span>
            </div>
            <div class="env-links">
                ${links.map(site => `
                    <a class="env-link" href="${buildUrl(env, site)}" target="_blank">
                        <span class="label"><span class="icon">${site.icon}</span>${site.label}</span>
                        <span class="url">${shortUrl(env, site)}</span>
                    </a>
                `).join('')}
            </div>
        `;
        grid.appendChild(card);
    });

    if (!anyVisible) {
        grid.innerHTML = '<div class="no-results">No results for "' + filter + '"</div>';
    }
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));
render('');
</script>
</body>
</html>
